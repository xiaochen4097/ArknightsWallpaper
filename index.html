<!DOCTYPE html>
<html lang="en">
<head>
	<!-- <script src="js/arknights.js"></script> -->
	<script src="js/jquery.3.3.1.min.js?v=1.0"></script>
	<script src="js/jquery.pjax.js?v=1.0"></script>
	<script src="js/GYST.js?v=1.0"></script>
	<script src="js/parallax.3.1.0.min.js?v=1.0"></script>
	<script src="js/mousePerspective.js?v=1.0"></script>
	<script src="js/scripts.js?v=1.1"></script>
	<style>
		/* loader */
		.loader-layer {
			/* background: #016d8d url(https://cdn.jsdelivr.net/gh/moezx/cdn@3.7.0/img/other/avg_2_1.png) no-repeat center center fixed; */
			-webkit-background-size: cover;
			-moz-background-size: cover;
			-o-background-size: cover;
			background-size: cover;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 999;
		}

		.loader-layer .tips {
			font-family: 'Noto Sans SC', sans-serif;
			color: #fff;
			font-size: 2vh;
			font-weight: 500;
			pointer-events: auto;
			margin: 10px;
			position: fixed;
		}

		.loader {
			width: calc(100% + 100px);
			overflow-x: hidden;
			overflow-y: hidden;
			position: absolute;
			left: -50px;
		}

		.loader .bar {
			position: relative;
			height: 2px;
			width: 500px;
			margin: 0 auto;
			background: #fff;
			margin-top: 150px;
		}

		.loader .circle {
			position: absolute;
			top: -30px;
			margin-left: -30px;
			height: 60px;
			width: 60px;
			left: 0;
			background: #fff;
			border-radius: 30%;
			-webkit-animation: move 5s infinite;
		}

		.loader p {
			position: absolute;
			top: -35px;
			right: -85px;
			text-transform: uppercase;
			color: #016d8d;
			font-family: helvetica, sans-serif;
			font-weight: bold;
		}

		@-webkit-keyframes move {
			0% {
				left: 0;
			}

			50% {
				left: 100%;
				-webkit-transform: rotate(450deg);
				width: 150px;
				height: 150px;
			}

			75% {
				left: 100%;
				-webkit-transform: rotate(450deg);
				width: 150px;
				height: 150px;
			}

			100% {
				right: 100%;

			}
		}

	</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<iframe id="live2d-frame" src="live2d.html" style="
        position: fixed;
        top: 0; left: 0; 
        width: 100vw; 
        height: 100vh; 
        border: none; 
	pointer-events: none;
        z-index: -1; 
        transform: scale(1.5) translate(-15vw, 0);">
    </iframe>
	<header>

							</div>
						</div>
						<div class="bottom">
							<div class="left">

							</div>
							<div class="right">
								<div class="pos-1">
									<div class="friends">
										<div class="icon"></div>
										<div class="text">好友</div>
									</div>
								</div>
								<div class="pos-2">
									<div class="information">
										<div class="icon"></div>
										<div class="text">情报</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div id="right-menu-layer" class="layer" data-depth="0.2">
				<div class="right menu box">
					<div class="popup" id="right-mune-popup-adapter"></div>
					<div class="container" id="right-mune-adapter">
						<div class="pos-1">
							<div class="top">
								<div class="line-left"></div>
								<div class="battery"></div>
								<div class="time" id="time">2019/06/05 22:33</div>
								<div class="line-right"></div>
							</div>
							<div class="bottom">
								<div class="bg"></div>
								<div class="status">
									<div class="item money">
										<div class="icon"></div>
										<div class="amount">1000</div>
									</div>
									<div class="item jasper">
										<div class="icon"></div>
										<div class="amount">1000</div>
										<div class="more"></div>
									</div>
									<div class="item stone">
										<div class="icon"></div>
										<div class="amount">1000</div>
										<div class="more"></div>
									</div>
								</div>
							</div>
						</div>
						<div class="pos-2">
							<div class="intellect">
								<div class="icon"></div>
								<div class="content">
									<div class="figure">
										<div class="value">125</div>
										<div class="total">/125</div>
									</div>
									<div class="battle">
										<div class="text">作战</div>
										<div class="current">当前</div>
										<div class="level">5-10 长夜终尽</div>
									</div>
								</div>
							</div>
						</div>
						<div class="pos-3">
							<div class="team">
								<div class="icon"></div>
								<div class="text">编队</div>
							</div>
							<div class="member">
								<div class="icon"></div>
								<div class="text">干员</div>
								<div class="desc">角色管理</div>
							</div>
							<div class="blank"></div>
						</div>
						<div class="pos-4">
							<div class="shop">
								<div class="icon"></div>
								<div class="text">采购中心</div>
							</div>
							<div class="gamble">
								<div class="top">
									<div class="icon"></div>
									<div class="text">招募</div>
								</div>
								<div class="bottom">
									<div class="left">
										<div class="icon"></div>
										<div class="text">公开招募</div>
									</div>
									<div class="right">
										<div class="icon"></div>
										<div class="text">干员寻访</div>
									</div>
								</div>
							</div>
						</div>
						<div class="pos-5">
							<div class="task">
								<div class="icon"></div>
								<div class="text">任务</div>
							</div>
							<div class="infrastructure">
								<div class="icon"></div>
								<div class="text">基建</div>

							</div>
							<div class="warehouse">
								<div class="icon"></div>

						</div>
					</div>
				</div>
			</div>
			<canvas id="canvas-dust"></canvas>
		</div>
	</div>
	</header>
	<script>
		window.addEventListener('DOMContentLoaded', function () {
			MousePerspective.create('#live2d-frame', {
				baseTransform: 'scale(1.5) translate(-15vw, 0)',
				perspective: 1400,
				maxRotateX: 0,
				maxRotateY: 0,
				maxTranslateX: 10,
				maxTranslateY: 0,
				easing: 0.08,
				resetOnLeave: false
			});
		});
	</script>
</body>
</html>
