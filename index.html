<!doctype html>
<html lang="en">
  <head>
    <script src="js/jquery.3.3.1.min.js?v=1.0"></script>
    <script src="js/jquery.pjax.js?v=1.0"></script>
    <script src="js/GYST.js?v=1.0"></script>
    <script src="js/parallax.3.1.0.min.js?v=1.0"></script>
    <script src="js/mousePerspective.js?v=1.0"></script>
    <style>
      /* loader */
      .loader-layer {
        /* background: #016d8d url(https://cdn.jsdelivr.net/gh/moezx/cdn@3.7.0/img/other/avg_2_1.png) no-repeat center center fixed; */
        -webkit-background-size: cover;
        -moz-background-size: cover;
        -o-background-size: cover;
        background-size: cover;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999;
      }

      .loader-layer .tips {
        font-family: "Noto Sans SC", sans-serif;
        color: #fff;
        font-size: 2vh;
        font-weight: 500;
        pointer-events: auto;
        margin: 10px;
        position: fixed;
      }

      .loader {
        width: calc(100% + 100px);
        overflow-x: hidden;
        overflow-y: hidden;
        position: absolute;
        left: -50px;
      }

      .loader .bar {
        position: relative;
        height: 2px;
        width: 500px;
        margin: 0 auto;
        background: #fff;
        margin-top: 150px;
      }

      .loader .circle {
        position: absolute;
        top: -30px;
        margin-left: -30px;
        height: 60px;
        width: 60px;
        left: 0;
        background: #fff;
        border-radius: 30%;
        -webkit-animation: move 5s infinite;
      }

      .loader p {
        position: absolute;
        top: -35px;
        right: -85px;
        text-transform: uppercase;
        color: #016d8d;
        font-family: helvetica, sans-serif;
        font-weight: bold;
      }

      @-webkit-keyframes move {
        0% {
          left: 0;
        }

        50% {
          left: 100%;
          -webkit-transform: rotate(450deg);
          width: 150px;
          height: 150px;
        }

        75% {
          left: 100%;
          -webkit-transform: rotate(450deg);
          width: 150px;
          height: 150px;
        }

        100% {
          right: 100%;
        }
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <iframe
      id="live2d-frame"
      src="live2d.html"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        pointer-events: none;
        z-index: -1;
        transform: scale(1.5) translate(-15vw, 0);
      "
    >
    </iframe>
    <iframe
      id="dust-frame"
      src="DustCanvas.html"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        pointer-events: none;
        z-index: 100;
      "
    >
    </iframe>
    <header>
      <div class="level-box-container">
        <div class="level-box" id="level-box-adapter">
          <div class="level-logo"></div>
          <div class="user-level">
            <div class="level-chart">
              <div class="chart-bg" id="chart-bg"></div>
              <div class="chart-pr" id="chart-pr"></div>
              <div class="level-num" id="level-num">64</div>
            </div>
          </div>
          <div class="user-info">
            <div class="name">Username</div>
            <div class="id">ID: UserID</div>
          </div>
        </div>
      </div>
    </header>

	<div id="LeftViewboxPerspective">
    <div id="view-box" class="view-box">
      <div id="left-menu-layer" class="layer" data-depth="0.2">
        <div class="left menu box">
          <div class="container" id="left-mune-adapter">
            <div class="top">
              <div class="dialog">
                <span>博士？睡着了？哼，真没紧张感。</span>
              </div>
            </div>
            <div class="bottom">
              <div class="left">
                <div class="activity-img"></div>
              </div>
              <div class="right">
                <div class="pos-1">
                  <div class="friends">
                    <div class="icon"></div>
                    <div class="text">好友</div>
                  </div>
                </div>
                <div class="pos-2">
                  <div class="information">
                    <div class="icon"></div>
                    <div class="text">情报</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
	</div>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        MousePerspective.create("#live2d-frame", {
          baseTransform: "scale(1.5) translate(-15vw, 0)",
          perspective: 1400,
          maxRotateX: 0,
          maxRotateY: 0,
          maxTranslateX: 10,
          maxTranslateY: -15,
          easing: 0.08,
          resetOnLeave: false,
        });
      });
    </script>
	<script>
		window.addEventListener("DOMContentLoaded", function () {
			MousePerspective.create(document.getElementById("LeftViewboxPerspective"), {
				baseTransform:"scale(1.3) translate(15vw, -15vh)",
				perspective: 1400,
				maxRotateX: 0,
				maxRotateY: 3,
				maxTranslateX: 2,
				maxTranslateY: 0,
				easing: 0.08,
				resetOnLeave: false
			});
		});
	</script>
    <!-- <script src="js/scripts.js?v=1.1"></script> -->
    <script src="js/arknights.js"></script>
  </body>
</html>
